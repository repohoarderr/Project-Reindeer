<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Upload</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Upload a File</h1>
      <form id="uploadForm">
        <input type="file" id="fileInput" name="file" required accept=".dxf" />
        <div class="button-group">
          <button type="submit">Upload</button>
          <button type="button" class="remove-button" id="removeFile">
            Remove File
          </button>
        </div>
      </form>
    </div>

    <script src="form.js"></script>
  </body>
</html>
